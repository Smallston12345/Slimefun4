#########################################################################
# 數據庫類型, 可選的有 SQLITE, MYSQL, POSTGRESQL
# 注意: 在切換數據庫類型時, 我們並不會自動幫你遷移數據 :)
storageType: SQLITE

# 使用Base64編碼數據字段
base64EncodeVal: true

# 區塊數據加載模式
# 可選的有:
# - LOAD_WITH_CHUNK: 當本次開服期間內區塊首次加載時加載粘液區塊數據
# - LOAD_ON_STARTUP: 當開服時一次性加載全部區塊數據，可能會導致開服時間較長
# 默認情況下推薦使用 LOAD_WITH_CHUNK 以節省不必要的內存開銷
# 如發現加載區塊時發生明顯卡頓，請更改為 LOAD_ON_STARTUP
dataLoadMode: LOAD_WITH_CHUNK
#########################################################################

#########################################################################
# 數據庫讀寫線程數
# 當使用 MySQL 時，建議將最大連接數設置為 讀取 + 寫入線程數，且讀取線程數量應當大於寫入線程。
# 注意: 線程數並非越多越好，過多反而會導致性能下降。請分配合適的數量。

# 讀取線程數
readExecutorThread: 10
# 寫入線程數
writeExecutorThread: 5
#########################################################################

#########################################################################
# 延遲寫入功能
# 本功能用於防止某些數據被頻繁寫入導致隊列中存在大量無意義的寫入請求。
# 啓用本功能後，當數據發生更改後會等待 (delayedSecond) 秒，如無其它改動再寫入數據庫。
# 強制保存時會將等待中的數據直接加入寫入隊列。
delayedWriting:
  # 是否啓用延遲寫入
  enable: true
  # 延遲寫入秒數
  delayedSecond: 5
  # 強制保存間隔（單位：秒）
  forceSavePeriod: 300
#########################################################################

#########################################################################
# Sqlite 配置
sqlite:
  maxConnection: 5
#########################################################################

#########################################################################
# MySQL 配置
mysql:
  # 數據庫連接地址
  host: "127.0.0.1"
  # 數據庫連接端口
  port: 3306
  # 數據庫名
  database: ""
  # 表前綴
  tablePrefix: ""
  # 連接用户名
  user: ""
  # 連接用户密碼
  password: ""
  # 是否使用加密連接
  useSSL: false
  # 最大連接數
  maxConnection: 15
#########################################################################

#########################################################################
# PostgreSQL 配置
postgresql:
  # 數據庫連接地址
  host: "127.0.0.1"
  # 數據庫連接端口
  port: 3306
  # 數據庫名
  database: ""
  # 表前綴
  tablePrefix: ""
  # 連接用户名
  user: ""
  # 連接用户密碼
  password: ""
  # 是否使用加密連接
  useSSL: false
  # 最大連接數
  maxConnection: 15
#########################################################################