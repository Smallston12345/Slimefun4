#########################################################################
# 數據庫類型, 可選的有 SQLITE, MYSQL, POSTGRESQL
# 注意: 在切換數據庫類型時, 我們並不會自動幫你遷移數據 :)
# 注意: 當使用MYSQL跨服時，請務必將 config.yml 中的 allow-open-when-owner-offline 設置為 false
#      以防止玩家在不同服務器打開同一個揹包刷物品。
storageType: SQLITE

# 使用Base64編碼數據字段
base64EncodeVal: true
#########################################################################

#########################################################################
# 數據庫讀寫線程數
# 當使用MYSQL時，建議 最大連接數 = 讀取 + 寫入線程數，且讀取線程數量應當大於寫入線程。
# 注意: 線程數並非越多越好，過多反而會導致性能下降。請分配合適的數量。

# 讀取線程數
readExecutorThread: 7
# 寫入線程數
writeExecutorThread: 3
#########################################################################

#########################################################################
# Sqlite 配置
sqlite:
  maxConnection: 5
#########################################################################

#########################################################################
# MySQL 配置
mysql:
  # 數據庫連接地址
  host: "127.0.0.1"
  # 數據庫連接端口
  port: 3306
  # 數據庫名
  database: ""
  # 表前綴
  tablePrefix: ""
  # 連接用户名
  user: ""
  # 連接用户密碼
  password: ""
  # 是否使用加密連接
  useSSL: false
  # 最大連接數
  maxConnection: 10
#########################################################################

#########################################################################
# PostgreSQL 配置
postgresql:
  # 數據庫連接地址
  host: "127.0.0.1"
  # 數據庫連接端口
  port: 3306
  # 數據庫名
  database: ""
  # 表前綴
  tablePrefix: ""
  # 連接用户名
  user: ""
  # 連接用户密碼
  password: ""
  # 是否使用加密連接
  useSSL: false
  # 最大連接數
  maxConnection: 10
#########################################################################